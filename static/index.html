<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏝️ 포코피아 - 클라우드섬 공유</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ko">한국어</button>
                <button class="lang-btn" data-lang="en">English</button>
                <button class="lang-btn" data-lang="ja">日本語</button>
            </div>
            <h1>🏝️ 포코피아</h1>
            <p>닌텐도 스위치2 포코피아 클라우드섬 공유 플랫폼</p>
        </header>

        <section class="upload-form">
            <h2>클우드섬 공유하기</h2>
            <form id="islandForm">
                <div class="form-group">
                    <label for="title">제목 *</label>
                    <input type="text" id="title" name="title" maxlength="50" placeholder="제목을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="description">설명</label>
                    <input type="text" id="description" name="description" maxlength="200" placeholder="간단한 소개 (선택)">
                </div>
                <div class="form-group">
                    <label for="code">클우드섬 코드 * <span class="hint">(Z, I, O 제외한 8자리 알파벳/숫자)</span></label>
                    <input type="text" id="code" name="code" maxlength="8" placeholder="예: 1234ABCD" required style="text-transform: uppercase;" inputmode="latin" lang="en">
                    <div id="code-hint" class="input-hint"></div>
                </div>
                <div class="form-group">
                    <label class="duration-label">공유 기간</label>
                    <div class="duration-options">
                        <label class="duration-option">
                            <input type="radio" name="duration" value="60" checked>
                            <span>1분</span>
                        </label>
                        <label class="duration-option">
                            <input type="radio" name="duration" value="300">
                            <span>5분</span>
                        </label>
                        <label class="duration-option">
                            <input type="radio" name="duration" value="1800">
                            <span>30분</span>
                        </label>
                        <label class="duration-option">
                            <input type="radio" name="duration" value="3600">
                            <span>60분</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn-submit">클우드섬 공유하기</button>
            </form>
            <div id="message" class="message"></div>
        </section>

        <section class="island-list">
            <div class="list-header">
                <h2>현재 활성화된 클라우드섬 <span id="count">(0)</span></h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="제목으로 검색...">
                </div>
            </div>
            <div id="islands" class="islands">
                <p class="empty">아직 공유된 클라우드섬이 없습니다.</p>
            </div>
        </section>
    </div>

    <script src="/i18n.js"></script>
    <script src="/app.js"></script>
</body>
</html>
